<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:#0b0f1a;color:#ffffff;font-family:Arial;">

  <!-- HEADER -->
  <div style="padding:20px;background:#111827;">
    <h2>Dashboard</h2>
    <p style="opacity:0.7;font-size:14px;">
      Account Status: <span style="color:#22c55e;">Active</span>
    </p>
  </div>

  <!-- STATS -->
  <div style="padding:20px;display:grid;grid-template-columns:repeat(2,1fr);gap:15px;">

    <div style="background:#111827;padding:15px;border-radius:10px;">
      <strong>Total Deposits</strong><br>
      <span style="font-size:18px;">$0.00</span>
    </div>

    <div style="background:#111827;padding:15px;border-radius:10px;">
      <strong>Total Profits</strong><br>
      <span style="font-size:18px;">$0.00</span>
    </div>

    <div style="background:#111827;padding:15px;border-radius:10px;">
      <strong>Bonuses</strong><br>
      <span style="font-size:18px;">$0.00</span>
    </div>

    <div style="background:#111827;padding:15px;border-radius:10px;">
      <strong>Withdrawals</strong><br>
      <span style="font-size:18px;">Locked</span>
    </div>

  </div>

  <!-- STATUS -->
  <div style="margin:20px;background:#111827;padding:20px;border-radius:10px;">
    <p>
      🔒 Withdrawals and funding actions are enabled only after
      KYC verification and admin approval.
    </p>
    <p style="opacity:0.7;font-size:14px;">
      Please follow the verification steps provided by your account manager.
    </p>
  </div>

</body>
</html>
